<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Confirmer suppression</title>
  <style>body{font-family:sans-serif;padding:20px} .card{background:#fff;padding:16px;border-radius:8px}</style>
</head>
<body>
  <div class="card">
    <h2>Confirmer la suppression</h2>
    <p>Voulez-vous vraiment supprimer le produit <strong>{{ p.nom }}</strong> ? Cette opération est irréversible.</p>
    <form method="post" action="{{ url_for('supprimer', id=p.id) }}">
      <button type="submit" style="background:#d32f2f;color:white;padding:8px 12px;border:none;border-radius:4px">Confirmer suppression</button>
      <a href="{{ url_for('home') }}" style="margin-left:12px">Annuler</a>
    </form>
  </div>
</body>
</html>
