<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Modifier boutique</title></head>
<body>
  <h2>Modifier boutique</h2>
  <form method="POST">
    <label>Nom</label>
    <input name="nom" value="{{ b.nom }}" required>
    <label>Marché</label>
    <input name="marche" value="{{ b.marche }}" required>
    <label>Adresse</label>
    <input name="adresse" value="{{ b.adresse or '' }}"><br>
    <button type="submit">Enregistrer</button>
  </form>
  <p><a href="{{ url_for('boutiques') }}">Retour</a></p>
</body>
</html>
