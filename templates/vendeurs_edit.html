<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Modifier vendeur</title></head>
<body>
  <h2>Modifier vendeur</h2>
  <form method="POST">
    <label>Nom</label>
    <input name="nom" value="{{ v.nom }}" required>
    <label>Téléphone</label>
    <input name="telephone" value="{{ v.telephone or '' }}">
    <label>Boutique</label>
    <select name="boutique_id">
      {% for b in boutiques %}
      <option value="{{ b.id }}" {% if v.boutique_id==b.id %}selected{% endif %}>{{ b.nom }}</option>
      {% endfor %}
    </select>
    <button type="submit">Enregistrer</button>
  </form>
  <p><a href="{{ url_for('vendeurs') }}">Retour</a></p>
</body>
</html>
