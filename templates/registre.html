<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Enregistrements</title>
  <style>body{font-family:sans-serif;padding:20px}.grid{display:flex;gap:12px}.card{background:#fff;padding:14px;border-radius:8px;flex:1;text-align:center}</style>
</head>
<body>
  <h2>Enregistrements</h2>
  <p><a href="{{ url_for('home') }}">Retour</a></p>
  <div class="grid">
    <div class="card">
      <h3>Marchés</h3>
      {% if marches %}
        <ul>
        {% for m in marches %}
          <li>{{ m }}</li>
        {% endfor %}
        </ul>
      {% else %}
        <p>Aucun marché enregistré.</p>
      {% endif %}
    </div>
    <div class="card">
      <h3>Boutiques</h3>
      <p><a href="{{ url_for('boutiques') }}">Voir boutiques</a></p>
    </div>
    <div class="card">
      <h3>Vendeurs</h3>
      <p><a href="{{ url_for('vendeurs') }}">Voir vendeurs</a></p>
    </div>
    <div class="card">
      <h3>Clients</h3>
      <p><a href="{{ url_for('clients') }}">Voir clients</a></p>
    </div>
    <div class="card">
      <h3>Produits</h3>
      <p><a href="{{ url_for('analyse') }}">Voir produits</a></p>
    </div>
  </div>
</body>
</html>
