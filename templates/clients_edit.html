<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Modifier client</title></head>
<body>
  <h2>Modifier client</h2>
  <form method="POST">
    <label>Nom</label>
    <input name="nom" value="{{ c.nom }}" required>
    <label>Contact</label>
    <input name="contact" value="{{ c.contact or '' }}">
    <label>Boutique (optionnel)</label>
    <select name="boutique_id">
      <option value="">-- Aucune --</option>
      {% for b in boutiques %}
      <option value="{{ b.id }}" {% if c.boutique_id==b.id %}selected{% endif %}>{{ b.nom }}</option>
      {% endfor %}
    </select>
    <button type="submit">Enregistrer</button>
  </form>
  <p><a href="{{ url_for('clients') }}">Retour</a></p>
</body>
</html>
