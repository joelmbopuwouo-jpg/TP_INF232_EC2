version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-change-me}
      FLASK_DEBUG: ${FLASK_DEBUG:-"0"}
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI:-"postgresql://postgres:postgres@db:5432/economie"}
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: economie
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
